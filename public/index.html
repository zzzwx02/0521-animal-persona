<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>动物塑 Animal Persona</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="brand" type="button" data-action="home" aria-label="返回首页">
          <span class="brand-mark" data-stage-animal="lion" aria-hidden="true"></span>
          <span>
            <strong>动物塑</strong>
            <small>Animal Persona</small>
          </span>
        </button>
        <button class="ghost-button" type="button" data-action="restart">重新测试</button>
      </header>

      <main>
        <section id="homePage" class="page page-active">
          <div class="hero">
            <div class="hero-copy">
              <p class="eyebrow">动物塑 v5.0 五维量表</p>
              <h1>测测你的动物塑</h1>
              <p class="hero-subtitle">用 24 道真实生活反应，生成你的动物代码和状态版本。</p>
              <div class="nickname-form">
                <label class="field-label" for="nicknameInput">开始前，先给这次测试起个昵称</label>
                <input id="nicknameInput" type="text" maxlength="24" autocomplete="nickname" placeholder="例如：小周" />
              </div>
              <div class="hero-actions">
                <button class="primary-button" type="button" data-action="start">开始测试</button>
                <span class="time-pill">24 题 · 约 3-5 分钟</span>
              </div>
              <p class="soft-note">娱乐与自我探索工具，不作为心理诊断或职业评估。</p>
            </div>
          </div>

          <div class="feature-strip">
            <article>
              <strong>5 分量表</strong>
              <span>从非常不同意到非常同意，减少选择题的偶然性。</span>
            </article>
            <article>
              <strong>12 种动物</strong>
              <span>前四维决定动物类型，第五维生成状态前缀。</span>
            </article>
            <article>
              <strong>后台昵称</strong>
              <span>测试昵称会随最终结果进入后台看板。</span>
            </article>
          </div>

          <div class="preview-grid" id="previewGrid"></div>
        </section>

        <section id="quizPage" class="page">
          <div class="quiz-layout">
            <div class="quiz-head">
              <div>
                <h2 id="questionTitle">题目</h2>
              </div>
              <div class="question-count">
                <strong id="currentCount">1</strong>
                <span>/ 24</span>
              </div>
            </div>

            <div class="progress-track" aria-hidden="true">
              <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="option-list" id="optionList"></div>

            <div class="quiz-actions">
              <button class="ghost-button" type="button" data-action="prev">上一题</button>
            </div>
          </div>
        </section>

        <section id="resultPage" class="page">
          <div class="result-hero">
            <div class="animal-card-large" id="resultAnimalCard"></div>
            <div class="result-copy">
              <p class="eyebrow">你的动物塑</p>
              <h2 id="resultName">动物型人格</h2>
              <p class="result-summary" id="resultSummary"></p>
              <div class="result-meta">
                <span id="matchPercent">匹配度 0%</span>
                <span id="secondaryAnimal">隐藏影子：-</span>
                <span id="confidenceText">置信度：稳定</span>
              </div>
              <div class="tag-row" id="keywordTags"></div>
            </div>
          </div>

          <div class="result-grid">
            <section class="panel">
              <div class="panel-head">
                <h3>五维倾向</h3>
              </div>
              <div class="score-list" id="scoreList"></div>
            </section>

            <section class="panel">
              <div class="panel-head">
                <h3>动物说明书</h3>
              </div>
              <div class="manual-list" id="manualList"></div>
            </section>

            <section class="panel">
              <div class="panel-head">
                <h3>状态说明</h3>
              </div>
              <div class="compat-list" id="compatList"></div>
            </section>

            <section class="panel share-panel">
              <div class="panel-head">
                <h3>分享卡</h3>
              </div>
              <div class="share-card-preview" id="shareCardPreview" aria-label="分享卡预览"></div>
              <canvas class="share-canvas-hidden" id="shareCanvas" width="900" height="1200" aria-hidden="true"></canvas>
              <div class="share-actions">
                <button class="primary-button" type="button" data-action="saveCard">保存图片</button>
                <button class="ghost-button" type="button" data-action="copyResult">复制结果</button>
              </div>
              <a class="fallback-link is-hidden" id="cardFallbackLink" target="_blank" rel="noreferrer">图片已生成，点开保存</a>
              <textarea class="copy-fallback is-hidden" id="copyFallback" readonly></textarea>
            </section>
          </div>
        </section>
      </main>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
